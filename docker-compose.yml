# NEXUS v7 — Docker Compose
# docker compose up nexus       → CLI mode
# docker compose up nexus-telegram → Telegram bot mode

services:
  nexus:
    build: .
    image: nexus-toti:v7
    container_name: nexus-toti
    stdin_open: true
    tty: true
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - NEXUS_TG_TOKEN=${NEXUS_TG_TOKEN:-}
      - NEXUS_TG_USERS=${NEXUS_TG_USERS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - nexus_data:/app/data
      - nexus_soul:/app/nexus/soul
    restart: unless-stopped

  nexus-telegram:
    build: .
    image: nexus-toti:v7
    container_name: nexus-toti-telegram
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - NEXUS_TG_TOKEN=${NEXUS_TG_TOKEN:-}
      - NEXUS_TG_USERS=${NEXUS_TG_USERS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - nexus_data:/app/data
      - nexus_soul:/app/nexus/soul
    command: ["--telegram"]
    restart: unless-stopped

  nexus-contributor-bot:
    build: .
    image: nexus-toti:v7
    container_name: nexus-contributor-bot
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - nexus_data:/app/data
    command: ["--contributor-bot"]
    restart: unless-stopped

volumes:
  nexus_data:
  nexus_soul: