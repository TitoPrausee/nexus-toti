# NEXUS v9 — Configuration
# Lean, fast, soul-driven. Cloud-only, no local fallback.

# ─── IDENTITY ───────────────────────────────────────────
nexus:
  name: "Toti"
  version: "9.0"
  language: "de"  # Primary language

# ─── LLM ROUTING ────────────────────────────────────────
llm:
  # Ollama Cloud Merge Proxy — round-robin across 2 accounts, no local fallback
  base_url: "http://host.docker.internal:11435"  # Merge Proxy (Cloud-only)
  local_url: "http://host.docker.internal:11435"  # Same proxy — cloud-only setup
  api_key_env: "OLLAMA_API_KEY"
  mode: "cloud"  # cloud ONLY — no local fallback

  # Primary model — fast, smart, German-capable
  default_model: "glm-5.1:cloud"
  default_temperature: 0.7
  default_max_tokens: 4096

  # Specialist models — used ONLY when delegated by Pair Router
  models:
    coding: "qwen3-coder-next:cloud"
    research: "glm-5.1:cloud"
    analysis: "kimi-k2.6:cloud"
    creative: "gemma4:cloud"
    fast: "deepseek-v4-flash:cloud"

  # Fallback chain — cloud only, no local models
  fallback: ["deepseek-v4-flash:cloud", "glm-5.1:cloud"]  # fast fallback, then universal
  max_retries: 2
  timeout: 120  # seconds
  stream: true  # always stream for fast responses

# ─── SOUL ───────────────────────────────────────────────
soul:
  enabled: true
  file: "soul/soul.yaml"  # personality, memories, relationships
  auto_save: true
  # Soul persists: who Toti is, who it talks to, what it learned
  # NOT session state — IDENTITY

# ─── MEMORY ─────────────────────────────────────────────
memory:
  # L1: Working memory (current conversation, auto-trimmed)
  # L2: Session memory (recent conversations, summarized)
  # L3: Long-term memory (important facts, user preferences)
  # L4: Soul memory (identity, relationships, core knowledge)
  l1_max_tokens: 8000
  l2_max_entries: 50
  l2_max_age_hours: 48
  l3_max_entries: 200
  l4_permanent: true
  auto_compress: true
  compress_threshold: 0.7  # compress when L1 is 70% full

  # Vector search for L3 semantic recall (v7.2)
  # Uses sentence-transformers for embedding-based similarity search
  vector_search:
    enabled: true
    model_name: "paraphrase-multilingual-MiniLM-L12-v2"  # ~470MB, 50+ languages
    similarity_threshold: 0.3  # minimum cosine similarity for results
    max_results: 10  # max results from vector search before filtering

# ─── TOOLS ──────────────────────────────────────────────
tools:
  enabled:
    # Core — always available
    - terminal      # Execute shell commands
    - file_read     # Read files
    - file_write    # Write/create files
    - file_search    # Search in files (grep)
    - web_search    # DuckDuckGo search
    - web_fetch     # Fetch URL content
    - code_exec     # Execute Python code
    - memory        # Read/write memory
    - delegation    # Delegate to specialist model
    - calculator    # Math
    - time          # Current date/time
  dangerous_requires_confirmation:
    - file_write
    - terminal
    - code_exec

# ─── TELEGRAM ───────────────────────────────────────────
telegram:
  token_env: "NEXUS_TG_TOKEN"
  authorized_users_env: "NEXUS_TG_USERS"
  streaming: true           # Stream responses token-by-token
  typing_indicator: true    # Show "typing..." while working
  max_message_length: 4096
  parse_mode: "MarkdownV2"
  # Fast response — send partial results while still thinking
  min_stream_interval: 0.3  # seconds between stream chunks

  # Per-user rate limiting (token bucket)
  rate_limiter:
    rate: 0.33              # messages per second (1 msg / 3s)
    burst: 5                # max burst: 5 rapid messages before throttling
    stale_after: 3600       # cleanup inactive user buckets after 1h
    cleanup_interval: 300   # run cleanup every 5 minutes

# ─── SESSION MANAGER ─────────────────────────────────────
session_manager:
  timeout_seconds: 3600       # Idle session timeout (1 hour)
  max_sessions: 50            # Maximum concurrent sessions
  cleanup_interval: 300       # Run cleanup every 5 minutes
  auto_save_on_cleanup: true  # Save conversation on session timeout

# ─── PERFORMANCE ─────────────────────────────────────────
performance:
  # Token budgets — tight limits for fast responses
  max_tokens_per_turn: 6000
  max_tokens_per_conversation: 80000
  max_tool_calls_per_turn: 6       # was 15 — cuts loops short
  max_duplicate_calls: 2           # was 3 — fail faster on repeats
  max_chain_repeats: 1            # was 2 — break circular chains immediately

  # Speed — respond immediately, think in background
  fast_acknowledge: true       # Send "thinking..." within 0.5s
  stream_partial_results: true # Send tool results as they come

  # Caching — don't ask LLM twice for the same thing
  response_cache_max: 100
  response_cache_ttl: 300  # 5 minutes

# ─── FAST RESPONSE LAYER ──────────────────────────────────
fast_response:
  enabled: true
  hybrid_ack_timeout: 2.0  # seconds to wait for hybrid ack upgrade

# ─── RESPONSE CACHE (Q&A Pairs) ──────────────────────────────
# Caches recurring questions for instant answers (< 10ms)
response_cache:
  max_cache_size: 500
  cache_ttl: 604800  # 7 days in seconds
  similarity_threshold: 0.85